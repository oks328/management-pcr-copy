<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accrual - Login</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .container { border: 1px solid #ccc; padding: 20px; width: 300px; margin: auto; border-radius: 10px; }
        .status { color: green; font-weight: bold; margin-bottom: 20px;}
    </style>
</head>
<body>

    <div class="container">
        <h2>Accrual System</h2>
        
        <p class="status">{{ status }}</p>

        <form action="/authenticate" method="POST">
            <input type="email" name="email" placeholder="Corporate Email" required><br><br>
            <input type="password" name="password" placeholder="Password" required><br><br>
            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
