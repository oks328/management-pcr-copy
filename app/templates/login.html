{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-primary" style="color: #0B3C86 !important;">Accrual System</h3>
                    <p class="text-muted">Digital IPCR Management</p>
                </div>

                <form action="{{ url_for('authenticate') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Corporate Email</label>
                        <input type="email" name="email" class="form-control bg-light" placeholder="e.g. employee@neust.edu.ph" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <input type="password" name="password" class="form-control bg-light" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" style="background-color: #0B3C86; border-color: #0B3C86;">Log In</button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color: #0B3C86;">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
